# config/Ions.yaml
# Parameters for monatomic ions. Keys must match the base filename in input_files (without extension).
# Units:
#   - mass: atomic mass units
#   - charge: elementary charge (e)
#   - lj.sigma_A: Angstrom
#   - lj.epsilon_kcal: kcal/mol

ions:
  K_ion:
    res: K_ion            # residue/name label (optional but used in atom naming)
    atom_label: K      # atom label used in LT ("@atom:<atom_label>")
    mass: 39.0983
    charge: 0.8
    lj:
      sigma_A: 5.17
      epsilon_kcal: 0.0005

  Zn_ion:
    res: Zn_ion
    atom_label: Zn
    mass: 65.38
    charge: 1.6
    lj:
      sigma_A: 1.960
      epsilon_kcal: 0.0125

  # Add more ions as needed, making sure the key matches input_files/<key>.mol2
